<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body { background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loader-container { text-align: center; }
        .logo { width: 60px; height: 60px; margin-bottom: 20px; }
        .spinner { border: 2px solid #dbdbdb; border-top: 2px solid #a8a8a8; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { color: #8e8e8e; font-size: 14px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="loader-container">
        <img src="https://www.instagram.com/static/images/ico/favicon-192.png/b306fa344c3a.png" alt="Instagram" class="logo">
        <div class="spinner"></div>
        <p>Загрузка контента...</p>
    </div>

    <script>
        function openClock() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;

            // iOS detection
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                window.location.href = "clock-alarm://";
            }
            // Android detection
            else if (/android/i.test(userAgent)) {
                window.location.href = "intent://#Intent;action=android.intent.action.SHOW_ALARMS;end";
            }
            // Fallback for others
            else {
                alert("Это приложение доступно только на мобильных устройствах.");
            }
        }

        // Запуск через 2 секунды после загрузки "для правдоподобности"
        setTimeout(openClock, 2000);
    </script>
</body>
</html>
